# docs -> Notion 단방향 동기화
#
# 설계: docs/plan/notion-sync.md · 스크립트: scripts/notion-sync.mjs
# main 브랜치에 docs/** 가 push되면 변경된 마크다운을 Notion에 upsert 한다.
# NOTION_TOKEN 시크릿이 없으면 조용히 skip 하여 실패하지 않는다.
name: notion-sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

# 최신 push만 반영 (중복 실행 취소)
concurrency:
  group: notion-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 직전 커밋과 비교해 변경 파일 산출

      - name: Guard - NOTION_TOKEN 존재 여부 확인
        id: guard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "NOTION_TOKEN 미설정 - sync 스킵"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        if: steps.guard.outputs.enabled == 'true'
        run: npm ci

      - name: 변경된 docs 마크다운 산출
        if: steps.guard.outputs.enabled == 'true'
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" "${{ github.sha }}" -- 'docs/**/*.md' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "변경 파일: $files"

      - name: Sync docs to Notion
        if: steps.guard.outputs.enabled == 'true' && steps.changed.outputs.files != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: node scripts/notion-sync.mjs ${{ steps.changed.outputs.files }}
