# docs -> Notion 단방향 동기화
#
# 설계: docs/plan/notion-sync.md · 스크립트: scripts/notion-sync.mjs
# main에 docs/** 가 push되면 변경된 마크다운을 Notion에 upsert 한다.
# 수동 실행(workflow_dispatch) 시에는 docs 전체를 동기화한다.
# NOTION_TOKEN 시크릿이 없으면 조용히 skip 하여 실패하지 않는다.
name: notion-sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch: {} # 수동 실행 -> 전체 동기화

concurrency:
  group: notion-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # before..sha diff를 위해 전체 히스토리

      - name: Guard - NOTION_TOKEN 존재 여부 확인
        id: guard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "NOTION_TOKEN 미설정 - sync 스킵"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        if: steps.guard.outputs.enabled == 'true'
        run: npm ci

      - name: 동기화 대상 마크다운 산출
        if: steps.guard.outputs.enabled == 'true'
        id: changed
        run: |
          before="${{ github.event.before }}"
          # 수동 실행 / 첫 push / before 미존재 -> docs 전체, 그 외 -> 변경분 diff
          if [ "${{ github.event_name }}" != "push" ] \
             || [ -z "$before" ] \
             || [ "$before" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            files=$(git ls-files -- ':(glob)docs/**/*.md' | tr '\n' ' ')
          else
            files=$(git diff --name-only --diff-filter=ACMR "$before" "${{ github.sha }}" -- ':(glob)docs/**/*.md' | tr '\n' ' ')
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "동기화 대상: ${files:-(없음)}"

      - name: Sync docs to Notion
        if: steps.guard.outputs.enabled == 'true' && steps.changed.outputs.files != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: node scripts/notion-sync.mjs ${{ steps.changed.outputs.files }}
