# private repo를 ArgoCD가 클론하기 위한 git 크리덴셜 예시.
# 실값(PAT)을 채운 사본을 repo-secret.yaml(gitignored)로 만들어 apply 한다:
#   kubectl apply -n argocd -f deploy/argocd/repo-secret.yaml
# PAT은 read-only(repo:contents 읽기) 권한이면 충분. 절대 커밋 금지.
apiVersion: v1
kind: Secret
metadata:
  name: dailyproof-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/ompangyji/dailyproof.git
  username: ompangyji # GitHub 사용자명
  password: YOUR-GITHUB-READONLY-PAT # 읽기용 PAT (커밋 금지)
