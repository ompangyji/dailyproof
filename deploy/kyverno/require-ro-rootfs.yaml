# Kyverno ClusterPolicy: 컨테이너 루트 파일시스템은 읽기전용이어야 한다.
# 근거: PSS restricted / 침해 시 디스크 변조·악성 실행파일 작성 차단(우리 web·worker·jaeger가 이미 적용).
# 정립·방법론: docs/security/admission-control.md, docs/retrospective/policy-as-code-methodology.md
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-ro-rootfs
  annotations:
    policies.kyverno.io/title: Require read-only root filesystem
    policies.kyverno.io/category: Pod Security
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-readOnlyRootFilesystem
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kyverno, monitoring, sealed-secrets]
      validate:
        message: "모든 컨테이너는 readOnlyRootFilesystem=true 여야 합니다(쓰기 필요한 경로는 emptyDir로)."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
