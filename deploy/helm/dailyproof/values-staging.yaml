# staging 환경 override. base(values.yaml)에 이 파일을 덮어쓴다:
#   helm template dp deploy/helm/dailyproof -f deploy/helm/dailyproof/values-staging.yaml
# 시크릿/공개키 실값은 여기 두지 않고 values-secret.yaml(gitignored)/--set로 주입.
image:
  web:
    tag: staging
  worker:
    tag: staging

web:
  replicas: 1

worker:
  replicas: 1

config:
  APP_ENV: staging
  LOG_LEVEL: info

# 로컬 k3s에선 Ingress가 LB status를 못 받아 ArgoCD가 영원히 Progressing → PostSync hook을 막는다.
# 로컬 staging에선 Ingress를 끈다(차트 템플릿은 유지). 실제 LB 있는 클러스터/prod에선 켠다.
ingress:
  enabled: false
