# 시크릿 주입 예시. 실제 값을 채운 사본을 values-secret.yaml(gitignored)로 만들어
#   helm install/upgrade dp deploy/helm/dailyproof -f deploy/helm/dailyproof/values-secret.yaml
# 처럼 쓴다. 실값은 절대 커밋하지 않는다. (Terraform 단계에서는 tfvars로 주입)
secrets:
  SUPABASE_SERVICE_ROLE_KEY: "YOUR-SERVICE-ROLE-KEY"

# 공개값이지만 환경별로 다른 것도 여기서 함께 덮어쓸 수 있다.
config:
  NEXT_PUBLIC_SUPABASE_URL: "https://YOUR-PROJECT.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "YOUR-ANON-KEY"
