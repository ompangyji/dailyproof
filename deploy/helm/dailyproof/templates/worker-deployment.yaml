apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dailyproof.fullname" . }}-worker
  labels:
    {{- include "dailyproof.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.autoscaling.worker.enabled }}
  replicas: {{ .Values.worker.replicas }} # autoscaling 켜지면 KEDA ScaledObject가 관리(여기선 생략)
  {{- end }}
  selector:
    matchLabels:
      {{- include "dailyproof.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dailyproof.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" "worker") | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault # 허용 syscall 제한(런타임 기본 프로파일)
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          # worker는 HTTP를 안 열어 httpGet probe 대상이 없다. 프로세스가 떠 있으면 살아있는 것으로 보고,
          # 정밀 liveness(폴링 동작 확인)는 추후 메트릭/파일 기반 exec probe로 보강한다.
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true # 루트FS 읽기전용
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # worker는 ConfigMap(비밀 아님) + Secret(service_role) 둘 다 주입.
          envFrom:
            - configMapRef:
                name: {{ include "dailyproof.fullname" . }}-config
            - secretRef:
                name: {{ include "dailyproof.fullname" . }}-secret
      volumes:
        - name: tmp
          emptyDir: {}
