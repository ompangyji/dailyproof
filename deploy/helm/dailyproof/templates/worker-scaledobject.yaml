{{- if .Values.autoscaling.worker.enabled }}
# worker 오토스케일 — pending 큐 깊이 기준(jobs 테이블). KEDA 필요(k3s 미번들 → KEDA 설치 전제).
# worker는 I/O-bound 폴링이라 CPU가 아니라 backlog로 늘려야 한다(scaling.md). claim_job이 FOR UPDATE
# SKIP LOCKED라 다중 worker 정합성은 이미 보장 → replicas만 큐 깊이에 맞춰 늘리면 된다.
# KEDA postgresql scaler가 jobs 테이블의 pending 수를 직접 조회. 연결 정보는 별도 시크릿(gitignored)로 주입:
#   .Values.autoscaling.worker.kedaConnectionSecret 가 host/port/dbname/user/password/sslmode 키를 가져야 함.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "dailyproof.fullname" . }}-keda-pg
  labels:
    {{- include "dailyproof.labels" . | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: host
      name: {{ .Values.autoscaling.worker.kedaConnectionSecret }}
      key: host
    - parameter: port
      name: {{ .Values.autoscaling.worker.kedaConnectionSecret }}
      key: port
    - parameter: dbName
      name: {{ .Values.autoscaling.worker.kedaConnectionSecret }}
      key: dbname
    - parameter: username
      name: {{ .Values.autoscaling.worker.kedaConnectionSecret }}
      key: user
    - parameter: password
      name: {{ .Values.autoscaling.worker.kedaConnectionSecret }}
      key: password
    - parameter: sslmode
      name: {{ .Values.autoscaling.worker.kedaConnectionSecret }}
      key: sslmode
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "dailyproof.fullname" . }}-worker
  labels:
    {{- include "dailyproof.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    name: {{ include "dailyproof.fullname" . }}-worker
  minReplicaCount: {{ .Values.autoscaling.worker.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.worker.maxReplicas }}
  triggers:
    - type: postgresql
      metadata:
        query: "SELECT count(*) FROM jobs WHERE status = 'pending'"
        targetQueryValue: "{{ .Values.autoscaling.worker.pendingThreshold }}"
      authenticationRef:
        name: {{ include "dailyproof.fullname" . }}-keda-pg
{{- end }}
