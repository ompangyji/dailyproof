apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dailyproof.fullname" . }}-secret
  labels:
    {{- include "dailyproof.labels" . | nindent 4 }}
type: Opaque
# 실값은 values-secret.yaml(gitignored)/--set/Terraform tfvars로 주입. 차트에는 빈 placeholder만.
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
