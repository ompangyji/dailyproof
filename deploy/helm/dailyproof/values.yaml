# 기본값(dev 기준). 환경별 차이는 values-staging.yaml / values-prod.yaml 로 덮어쓴다(추후).
image:
  web:
    repository: dailyproof-web
    tag: latest
    pullPolicy: IfNotPresent      # k3s containerd에 import한 로컬 이미지를 그대로 사용(레지스트리 pull 안 함)
  worker:
    repository: dailyproof-worker
    tag: latest
    pullPolicy: IfNotPresent

web:
  replicas: 1
  containerPort: 3000
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

# 외부 노출(Ingress). k3s 기본 컨트롤러는 Traefik. (포트포워딩을 대체하는 정식 진입로)
ingress:
  enabled: true
  className: traefik
  host: dailyproof.local # 로컬은 노드 IP를 /etc/hosts 에 매핑(또는 *.localhost)
  path: /
  pathType: Prefix
  # HTTP 정책은 컨트롤러별 annotation/Middleware로 건다(architecture/network.md 참조).
  #   업로드 8MB 대응 body size / read timeout / keep-alive 등.
  #   NGINX 예) nginx.ingress.kubernetes.io/proxy-body-size: "8m"
  #            nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
  #   Traefik(k3s)의 body size·timeout은 Middleware CRD로 건다(network.md에 예시).
  annotations: {}

worker:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

# 비밀 아닌 런타임 설정 → ConfigMap으로 렌더되어 envFrom으로 주입된다.
# NEXT_PUBLIC_* 는 공개값(URL·anon 키: RLS로 보호)이라 여기 둔다(placeholder, 환경별 주입).
config:
  APP_ENV: dev
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
  WORKER_POLL_IDLE_MS: "2000"
  WORKER_RETRY_BASE_MS: "5000"
  WORKER_CALL_TIMEOUT_MS: "10000"
  NEXT_PUBLIC_SUPABASE_URL: ""
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ""

# 진짜 시크릿 → Secret으로 렌더. 실값은 절대 커밋하지 않는다.
# 주입: helm 시 -f values-secret.yaml(gitignored) 또는 --set, Terraform 시 tfvars(추후).
secrets:
  SUPABASE_SERVICE_ROLE_KEY: ""

# 배포 후 자동 smoke (ArgoCD PostSync hook). sync마다 health/metrics를 curl로 점검.
postSyncSmoke:
  enabled: true
  image: curlimages/curl:8.11.1

# 관측 연동(kube-prometheus-stack). ServiceMonitor(web /metrics scrape) + PrometheusRule(보안 알림)
# + scrape용 NetworkPolicy. CRD가 필요해 스택 설치 후 켠다(기본 off). 근거: docs/architecture/metrics.md
monitoring:
  enabled: false
  prometheusRelease: kps # kube-prometheus-stack 릴리스명(ServiceMonitor/Rule 선택 라벨)
  namespace: monitoring # Prometheus가 사는 네임스페이스(scrape ingress 허용 대상)

# 관측: 트레이스 수집(jaeger all-in-one). web·worker가 http://jaeger:4318 로 보내므로 Service명=jaeger.
# UI(16686)는 인증 없어 ingress 미노출 → port-forward로 접근. 저장 in-memory(데모). 근거: architecture/tracing.md
jaeger:
  enabled: true
  image: jaegertracing/all-in-one:1.62.0 # :latest는 EOL 경고 → 버전 고정(재현성)

# 네트워크 최소권한(default-deny + 필요한 흐름만). k3s는 NetworkPolicy를 강제(kube-router netpol).
# 보안 기본값이라 on. 근거·한계(FQDN 제약): docs/architecture/network.md
networkPolicy:
  enabled: true
  otlpPort: 4318 # 트레이스(OTLP) egress 허용 포트 — jaeger를 같은 namespace에 배포할 때 사용
  # ingress 컨트롤러가 있는 네임스페이스(여기서 오는 트래픽만 web으로 허용). k3s Traefik은 kube-system.
  # 비우면 모든 네임스페이스에서 web:port 허용(가장 호환적). 좁히려면 컨트롤러 ns를 지정.
  ingressControllerNamespace: kube-system

# 오토스케일. web=CPU(HorizontalPodAutoscaler, metrics-server 필요 — k3s 기본 번들),
# worker=pending 큐 깊이(KEDA ScaledObject, KEDA 설치 필요). 켜면 해당 Deployment의 정적 replicas는 생략된다.
autoscaling:
  web:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  worker:
    enabled: false # KEDA ScaledObject (KEDA 설치 전제)
    minReplicas: 1
    maxReplicas: 5
    pendingThreshold: "20" # pending job 수가 이 값을 넘으면 scale out
    # KEDA가 jobs 테이블을 조회할 Postgres 연결 시크릿 이름(gitignored로 별도 생성).
    #   필요 키: host, port, dbname, user, password, sslmode
    kedaConnectionSecret: dailyproof-keda-pg
